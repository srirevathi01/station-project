AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distributions for Station Dev FM and Custom App (CM) frontends

Parameters:
  Environment:
    Type: String
    Description: Environment name (dev, stage, prod, etc.)
  ProjectName:
    Type: String
  SSLCertificateID:
    Type: String
  FMDomainName:
    Type: String
    Description: Custom domain for the FM frontend (e.g. fm.station.knackforge.com)
    Default: ''
  CMDomainName:
    Type: String
    Description: Custom domain for the Custom App (CM) frontend (e.g. cm.station.knackforge.com)
    Default: ''

Resources:
  # ---- FM frontend ----
  FMOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${Environment}-fm-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FMDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName}-${Environment} FM frontend"
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_All
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: FMS3Origin
            DomainName: !Sub "${ProjectName}-${Environment}-fm-${AWS::AccountId}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt FMOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: FMS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        # React SPA: serve index.html for all 403/404s
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  FMBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "${ProjectName}-${Environment}-fm-${AWS::AccountId}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadFM
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ProjectName}-${Environment}-fm-${AWS::AccountId}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FMDistribution}"

  # ---- Custom App (CM) frontend ----
  CMOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${Environment}-cm-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CMDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName}-${Environment} Custom App (CM) frontend"
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_All
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: CMS3Origin
            DomainName: !Sub "${ProjectName}-${Environment}-cm-${AWS::AccountId}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CMOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: CMS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        # React SPA: serve index.html for all 403/404s
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  CMBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "${ProjectName}-${Environment}-cm-${AWS::AccountId}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadCM
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ProjectName}-${Environment}-cm-${AWS::AccountId}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CMDistribution}"

Outputs:
  FMCDNDomainName:
    Description: FM frontend CloudFront domain
    Value: !GetAtt FMDistribution.DomainName

  FMCDNId:
    Description: FM frontend CloudFront distribution ID
    Value: !Ref FMDistribution

  CMCDNDomainName:
    Description: Custom App (CM) CloudFront domain
    Value: !GetAtt CMDistribution.DomainName

  CMCDNId:
    Description: Custom App (CM) CloudFront distribution ID
    Value: !Ref CMDistribution
