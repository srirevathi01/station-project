AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront bucket policies for Station Dev FM and Custom App (CM) frontends

Parameters:
  Environment:
    Type: String
    Description: Environment name (dev, stage, prod, etc.)
  ProjectName:
    Type: String
  FMDistributionId:
    Type: String
    Description: Existing CloudFront Distribution ID for the FM frontend (e.g. EWPN15R7CDHZM)
  CMDistributionId:
    Type: String
    Description: Existing CloudFront Distribution ID for the Custom App (CM) frontend (e.g. E3FZJBHWQ483PR)

Resources:
  # ---- FM frontend ----
  FMBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "${ProjectName}-${Environment}-fm-${AWS::AccountId}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadFM
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ProjectName}-${Environment}-fm-${AWS::AccountId}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FMDistributionId}"

  # ---- Custom App (CM) frontend ----
  CMBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "${ProjectName}-${Environment}-cm-${AWS::AccountId}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadCM
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ProjectName}-${Environment}-cm-${AWS::AccountId}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CMDistributionId}"

Outputs:
  FMCDNDomainName:
    Description: FM frontend CloudFront domain
    Value: !Sub "${FMDistributionId}.cloudfront.net"

  FMCDNId:
    Description: FM frontend CloudFront distribution ID
    Value: !Ref FMDistributionId

  CMCDNDomainName:
    Description: Custom App (CM) CloudFront domain
    Value: !Sub "${CMDistributionId}.cloudfront.net"

  CMCDNId:
    Description: Custom App (CM) CloudFront distribution ID
    Value: !Ref CMDistributionId
