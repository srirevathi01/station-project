AWSTemplateFormatVersion: "2010-09-09"
Description: S3 buckets for Station Dev - FM and Custom App frontend static assets
Parameters:
  ProjectName:
    Type: String
    Description: Project name for resource naming
    Default: station
  Environment:
    Type: String
    Description: Environment name (dev, stage, prod, etc.)
    Default: dev

Resources:
  # S3 bucket for FM frontend
  FMBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-fm-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-fm"
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: fm

  # S3 bucket for Custom App (cm) frontend
  CMBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-cm-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-cm"
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: cm

Outputs:
  FMBucketName:
    Description: FM frontend S3 bucket name
    Value: !Ref FMBucket

  FMBucketArn:
    Description: FM frontend S3 bucket ARN
    Value: !GetAtt FMBucket.Arn

  CMBucketName:
    Description: Custom App (CM) frontend S3 bucket name
    Value: !Ref CMBucket

  CMBucketArn:
    Description: Custom App (CM) frontend S3 bucket ARN
    Value: !GetAtt CMBucket.Arn
