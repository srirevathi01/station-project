AWSTemplateFormatVersion: '2010-09-09'
Description: Creates ECS task definitions for Django and FastAPI.

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  DjangoContainerPort:
    Type: Number
    Default: 80
  FastAPIContainerPort:
    Type: Number
    Default: 81
  ECSTaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS Task Execution Role
  ECSTaskRoleArn:
    Type: String
    Description: ARN of the ECS Task Role

Resources:
  DjangoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}-django

  FastAPILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}-fastapi

  DjangoTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-django
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: django
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-${Environment}-django:latest
          Essential: true
          PortMappings:
            - ContainerPort: !Ref DjangoContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DjangoLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  FastAPITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-fastapi
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: fastapi
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-${Environment}-fastapi:latest
          Essential: true
          PortMappings:
            - ContainerPort: !Ref FastAPIContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FastAPILogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

Outputs:
  DjangoTaskDefinitionArn:
    Value: !Ref DjangoTaskDefinition
  FastAPITaskDefinitionArn:
    Value: !Ref FastAPITaskDefinition


