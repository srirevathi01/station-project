AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  SSLCertificateID:
    Type: String
  LoadbalancerSecurityGroup:
    Type: String
    Description: Security Group ID for the ALB
  PublicSubnets:
    Type: String
    Description: Comma-separated list of public subnet IDs
  TargetGroup1:
    Type: String
    Description: ARN of Django target group (blue)
  TargetGroup2:
    Type: String
    Description: ARN of FastAPI target group (blue)

Resources:
  Loadbalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-alb
      # ALB requires at most one subnet per AZ.
      # VPC export contains 6 public subnets (2 per AZ), so choose first 3.
      Subnets:
        - Fn::Select:
            - 0
            - Fn::Split:
                - ','
                - !Ref PublicSubnets
        - Fn::Select:
            - 1
            - Fn::Split:
                - ','
                - !Ref PublicSubnets
        - Fn::Select:
            - 2
            - Fn::Split:
                - ','
                - !Ref PublicSubnets
      SecurityGroups:
        - !Ref LoadbalancerSecurityGroup
      Type: application
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-alb
        - Key: Environment
          Value: !Ref Environment

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Loadbalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            Port: 443
            Protocol: HTTPS
            StatusCode: HTTP_301

  HTTPSListener1:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Sub "arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${SSLCertificateID}"
      LoadBalancerArn: !Ref Loadbalancer
      Port: 443
      Protocol: HTTPS
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup1

  HTTPSListener2:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Sub "arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${SSLCertificateID}"
      LoadBalancerArn: !Ref Loadbalancer
      Port: 9443
      Protocol: HTTPS
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup2

  FastAPIListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener1
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /fastapi
            - /fastapi/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup2

Outputs:
  Loadbalancer:
    Value: !GetAtt Loadbalancer.DNSName
    Description: Application Load Balancer DNS Name
  ProdListener:
    Description: HTTPS Listener on port 443 (Django)
    Value: !Ref HTTPSListener1
  TestListener:
    Description: HTTPS Listener on port 9443 (FastAPI)
    Value: !Ref HTTPSListener2
